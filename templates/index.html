<!DOCTYPE html>
<html>
<head>
    <title>AI Fintech Implementation Copilot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        textarea {
            width: 100%;
            max-width: 100%;
            font-family: inherit;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        pre {
            white-space: pre-wrap;
            font-family: inherit;
        }

        footer {
            text-align: center;
            color: #666;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <h1>AI Fintech Implementation Copilot</h1>

    <h2>Meeting Notes</h2>

    <form method="POST">


        <textarea
            name="meeting_notes"
            rows="10"
            cols="80"
            placeholder="Paste meeting notes here..."
        ></textarea>

        <br><br>

        <button>
            Analyze
        </button>

    </form>
    
    <h2>Submitted Notes</h2>

    <p>{{ meeting_notes }}</p>

    <h2>Analysis Results</h2>

    <pre>{{ analysis }}</pre>

    <hr>

    <footer>
        <p>© {{ current_year }} Bond River Partners. All rights reserved.</p>
    </footer>
 <!--    <footer>
        <p>DEBUG YEAR: {{ current_year }}</p>
    </footer> -->

</body>
</html>
